version: '3.8'

services:
  ai-bid:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-bid-system
    ports:
      - "8000:8000"
    volumes:
      - bid-data:/app/data
      - ./config:/app/config:ro
    environment:
      - NODE_ENV=production
      - PORT=8000
      # AI 模型配置（必填）
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.openai.com/v1}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o}
      - MODEL_NAME=${MODEL_NAME:-AI Model}
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3

volumes:
  bid-data:
    driver: local
